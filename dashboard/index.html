<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Geopol Hazard Monitor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // GoatCounter: count each hash route as its own pageview (SPA mode).
      // count.js ignores localhost by default, so dev/preview runs don't pollute stats.
      window.goatcounter = { no_onload: true };
      window.__gcCount = function () {
        if (window.goatcounter && window.goatcounter.count)
          window.goatcounter.count({ path: location.pathname + (location.hash || '#/') });
      };
      window.addEventListener('hashchange', function () { window.__gcCount(); });
    </script>
    <script data-goatcounter="https://rikuxcv.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"
            onload="window.__gcCount()"></script>
  </body>
</html>
